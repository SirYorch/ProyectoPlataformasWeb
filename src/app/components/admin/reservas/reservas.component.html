<!--Contenidos-->
<div class="selector">
    <strong>Reservas</strong>
</div>

<div class="ventana vertical">

    <section class="aa-section arriendoss" *ngFor="let usuario of usuarios">
        
        <p> {{usuario.nombre}}</p>
        <button class="button percentage" (click)="verEspacio(usuario.lugar.id)">Ver</button>
        <div class="exit">
            <a (click)="eliminarReserva(usuario.reserva.id)">X</a>
        </div>
    </section>
</div>

<app-parqueadero class="absolute parking-hidden" #ver></app-parqueadero>

<app-confirm-dialogs></app-confirm-dialogs>
<app-pop-ups></app-pop-ups>
<app-menu></app-menu>
