<!--Contenidos-->
<div class="selector">
  <strong>Menu principal</strong>
</div>

<div class="ventana mprincipal">
<article class="datos-bienvenida">
  <article class="bienvenida ">
    <p>Bienvenido {{nombre}}, el estado actual del parqueadero es {{estado}}</p>
  </article>
  <article class="bienvenida ">
    <p>{{motd}}</p>
  </article>
<div>

<button class="cp button ae-button entrar " (click)="enviarCorreo()">Enviar correos</button>
<button class="cp button ae-button entrar" (click)="borrarReservas()">Eliminar Reservas</button>
</div>
</article>

<div class="tc">
    <div class="tarifas">
        <h2>Tarifas</h2>

        <div class="tarifass">
          <label>
              <p>Desde:</p>
              <p>Hasta:</p>
              <s>Precio:</s>
          </label><br>
      </div>
        <div *ngFor="let tarifa of tarifas" class="tarifass">
            <label>
                <p>{{ tarifa.desde }}H</p>
                <p>{{ tarifa.hasta }}H</p>
                <s>${{ tarifa.precio }}</s>
            </label><br>
        </div>
    </div>
</div>

<app-parqueadero></app-parqueadero>
</div>


<app-pop-ups></app-pop-ups>
<app-confirm-dialogs></app-confirm-dialogs>
<app-menu></app-menu>
